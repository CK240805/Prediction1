name: Retrain LSTM

on:
  workflow_dispatch:                        # manual trigger
  schedule:
    - cron: '0 3 * * 1'                    # every Monday at 03:00 UTC

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write                      # allows pushing to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train LSTM model
        run: python toto_engine.py train --epochs 30

      - name: Commit and push new model weights
        run: |
          git config user.name "toto-bot"
          git config user.email "toto-bot@example.com"
          git add -f ml/model_weights.pt          # force-add even if .gitignored
          if git diff --staged --quiet; then
            echo "Model weights unchanged."
          else
            git commit -m "model: update LSTM weights [skip ci]"
            git push
          fi
