name: Backfill Historical Draws
on:
  workflow_dispatch:
    inputs:
      start:
        description: 'First draw number'
        required: true
        type: number
        default: 3900
      end:
        description: 'Last draw number (inclusive)'
        required: true
        type: number
        default: 4050

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:                # allows committing and pushing
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill draws
        run: python toto_engine.py backfill --from ${{ inputs.start }} --to ${{ inputs.end }}

      - name: Commit and push updated CSV
        run: |
          git config user.name "toto-bot"
          git config user.email "toto-bot@example.com"
          git add data/toto_results.csv
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: backfill draws ${{ inputs.start }}-${{ inputs.end }} [skip ci]"
            git push
          fi
