name: Update TOTO Data
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:                # <-- add this block
      contents: write           # allows pushing commits

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python toto_engine.py scrape
      - name: Commit and push
        run: |
          git config user.name "toto-bot"
          git config user.email "toto-bot@example.com"
          git add data/toto_results.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: update [skip ci]"
            git push
          fi
