name: Update TOTO Data
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python toto_engine.py scrape
      - name: Commit changes
        run: |
          git config user.name "toto-bot"
          git config user.email "bot@example.com"
          git add data/toto_results.csv
          git diff --staged --quiet || git commit -m "data: update [skip ci]"
          git push
